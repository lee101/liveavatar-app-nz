build:
  gpu: true
  cuda: "12.8"
  python_version: "3.10"
  sdk_version: "0.21.0"
  system_packages:
    - ffmpeg
    - git
    - libgl1
    - libglib2.0-0
  run:
    # Cog already supplies CUDA 12.8, cuDNN, cuBLAS, and NCCL. Installing the
    # PyTorch wheels without their duplicate nvidia-* packages removes several
    # compressed gigabytes from each cold pull.
    - pip install --no-deps torch==2.8.0 torchvision==0.23.0 torchaudio==2.8.0 --index-url https://download.pytorch.org/whl/cu128
    - pip install -r requirements.txt
    - git clone --filter=blob:none --no-checkout https://github.com/Alibaba-Quark/LiveAvatar.git /opt/liveavatar
    - git -C /opt/liveavatar sparse-checkout set liveavatar
    - git -C /opt/liveavatar fetch --depth 1 origin 76489bc1c6718edbf610009bcd5e5436b0dc8459
    - git -C /opt/liveavatar checkout --detach 76489bc1c6718edbf610009bcd5e5436b0dc8459
    - pip install flash-attn==2.8.3 --no-build-isolation
image: ghcr.io/lee101/liveavatar-app-nz:latest
run: "predict.py:Predictor"
